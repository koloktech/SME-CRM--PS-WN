<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Wan Boutique Invoice</title></head>
<body>
  <!-- Reference template. The live application generates this layout from the selected order. -->
  <h1>WAN BOUTIQUE</h1>
  <p>Invoice: {{invoiceNumber}} · {{invoiceDate}}</p>
  <p>{{customerName}}<br>{{customerAddress}}</p>
  <table><thead><tr><th>Item</th><th>Qty</th><th>Cost</th><th>Service fee</th><th>Total</th></tr></thead><tbody>{{itemRows}}</tbody></table>
  <p>Grand total: {{grandTotal}}</p><p>Thank you for shopping with us.</p>
</body></html>
