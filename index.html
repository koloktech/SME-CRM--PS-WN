<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#8f3054" />
    <meta name="description" content="Wan Boutique personal-shopping order manager" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <title>Wan Boutique | Order Manager</title>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <a class="brand" href="#dashboard" aria-label="Wan Boutique home">
          <span class="brand-mark">WB</span><span>WAN<br />BOUTIQUE</span>
        </a>
        <nav class="nav" aria-label="Main navigation">
          <a href="#dashboard" data-route="dashboard">Dashboard</a>
          <a href="#new-order" data-route="new-order">New order</a>
          <a href="#orders" data-route="orders">Orders</a>
          <a href="#customers" data-route="customers">Customers</a>
          <a href="#payments" data-route="payments">Payments</a>
          <a href="#settings" data-route="settings">Settings</a>
        </nav>
        <div class="sidebar-foot">Personal-shopping order manager<br /><span id="connection-state">Demo mode</span></div>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <button class="icon-button mobile-menu" id="menu-button" aria-label="Open menu">☰</button>
          <div>
            <p class="eyebrow" id="page-kicker">ORDER MANAGEMENT</p>
            <h1 id="page-title">Dashboard</h1>
          </div>
          <button class="button button-primary" id="quick-order">+ New order</button>
        </header>
        <section id="app" class="page-container" aria-live="polite"></section>
      </main>
    </div>
    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <div id="modal-root"></div>
    <script src="app.js" defer></script>
  </body>
</html>
